<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Runner AI Evolutiva</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>
  <div class="game-wrap">
    <div class="top-ui">
      <div id="modePill" class="status-pill">AI EVOLUTIVA EN VIVO</div>
      <div id="speedPill" class="status-pill">DIFICULTAD x1</div>
      <button id="herobrineBtn" class="power-btn" type="button">HEROBRINE: COMING SOON</button>
      <div class="hint">
        <div>AI evolucionando en vivo: cada intento es mas brutal</div>
        <div>Chat manda la dificultad: escribe SPEED para subirla y SLOW para bajarla</div>
      </div>
    </div>

    <div class="canvas-frame">
      <canvas id="game" width="900" height="380"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@streamerbot/client/dist/streamerbot-client.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
